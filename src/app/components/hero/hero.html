<section
  id="hero"
  class="relative min-h-screen bg-amber-flame flex flex-col justify-center overflow-hidden"
>
  <!-- Background texture grid -->
  <div
    class="absolute inset-0 opacity-10"
    style="background-image: repeating-linear-gradient(0deg,#000 0,#000 1px,transparent 1px,transparent 60px),repeating-linear-gradient(90deg,#000 0,#000 1px,transparent 1px,transparent 60px);"
  ></div>

  <!-- Large decorative letter -->
  <span
    class="absolute -right-8 top-1/2 -translate-y-1/2 font-display font-black text-black/5 select-none pointer-events-none leading-none"
    style="font-size: clamp(14rem, 30vw, 28rem);"
    aria-hidden="true"
  >S</span>

  <div class="relative max-w-7xl mx-auto px-6 lg:px-10 pt-28 pb-20">

    <!-- Eyebrow -->
    <p class="hero-eyebrow text-dark/60 text-sm font-medium tracking-[0.3em] uppercase mb-6 opacity-0">
      Portfolio
    </p>

    <!-- Main heading -->
    <h1
      class="hero-name font-display font-black text-dark leading-none mb-4 opacity-0"
      style="font-size: clamp(3rem, 8vw, 7rem);"
    >
      Sara<br />Holanda
    </h1>

    <!-- Typewriter -->
    <div class="hero-cascade h-12 flex items-center mb-10 opacity-0">
      <span class="font-display font-semibold text-dark/80"
            style="font-size: clamp(1.25rem, 3vw, 2rem);">
        {{ typedText() }}<span class="animate-pulse">|</span>
      </span>
    </div>

    <!-- Desc -->
    <p class="hero-cascade text-dark/70 max-w-lg text-lg leading-relaxed mb-12 opacity-0">
      Design centrado em pessoas. Pesquisa que transforma em produto.
      Código que dá vida às interfaces.
    </p>

    <!-- CTAs -->
    <div class="hero-cascade flex flex-wrap gap-4 opacity-0">
      <button
        (click)="scrollToProjects()"
        class="inline-flex items-center gap-2 bg-dark text-white font-display font-semibold px-8 py-4 text-sm tracking-wide uppercase hover:bg-dark/80 transition-colors duration-200 cursor-pointer border-0"
      >
        Ver Projetos
        <lucide-icon name="arrow-right" [size]="16"></lucide-icon>
      </button>
      <button
        (click)="scrollToContact()"
        class="inline-flex items-center gap-2 border-2 border-dark text-dark font-display font-semibold px-8 py-4 text-sm tracking-wide uppercase hover:bg-dark hover:text-white transition-colors duration-200 cursor-pointer bg-transparent"
      >
        Contato
      </button>
    </div>

    <!-- Stats row -->
    <div class="flex flex-wrap gap-10 mt-20 pt-10 border-t border-dark/20">
      <div class="hero-stat opacity-0">
        <p class="font-display font-black text-dark text-4xl">6+</p>
        <p class="text-dark/60 text-sm tracking-wide uppercase mt-1">Prêmios</p>
      </div>
      <div class="hero-stat opacity-0">
        <p class="font-display font-black text-dark text-4xl">2</p>
        <p class="text-dark/60 text-sm tracking-wide uppercase mt-1">Case Studies</p>
      </div>
      <div class="hero-stat opacity-0">
        <p class="font-display font-black text-dark text-4xl">11+</p>
        <p class="text-dark/60 text-sm tracking-wide uppercase mt-1">Skills</p>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-dark/50">
    <span class="text-xs tracking-widest uppercase">Scroll</span>
    <lucide-icon name="chevron-down" [size]="18" class="animate-bounce"></lucide-icon>
  </div>
</section>
