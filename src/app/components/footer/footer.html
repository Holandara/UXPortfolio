<footer id="footer" class="bg-dark border-t border-white/10">

  <!-- Main footer -->
  <div class="max-w-7xl mx-auto px-6 lg:px-10 py-20">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">

      <!-- Brand -->
      <div class="lg:col-span-2">
        <h3 class="font-display font-black text-white mb-3"
            style="font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1;">
          Vamos criar<br/>
          <span class="text-amber-flame">algo incrível?</span>
        </h3>
        <p class="text-white/50 text-base leading-relaxed max-w-md mt-6">
          Disponível para projetos freelance, colaborações e oportunidades full-time
          em design de produto e desenvolvimento frontend.
        </p>
        <a
          href="mailto:sara&#64;exemplo.com"
          class="inline-flex items-center gap-2 mt-8 bg-amber-flame text-dark font-display font-bold px-8 py-4 text-sm tracking-wide uppercase hover:bg-gold transition-colors duration-200 no-underline"
        >
          Enviar mensagem
          <lucide-icon name="arrow-right" [size]="16"></lucide-icon>
        </a>
      </div>

      <!-- Links -->
      <div class="flex flex-col gap-4">
        <p class="text-white/30 text-xs tracking-widest uppercase font-medium mb-2">
          Links
        </p>
        <a
          href="https://github.com/Holandara"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 text-white/60 hover:text-white transition-colors duration-200 no-underline group"
        >
          <lucide-icon name="github" [size]="16" class="text-white/30 group-hover:text-white transition-colors"></lucide-icon>
          <span class="text-sm font-medium">GitHub</span>
        </a>
        <a
          href="https://www.behance.net/Marbles"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 text-white/60 hover:text-white transition-colors duration-200 no-underline group"
        >
          <lucide-icon name="linkedin" [size]="16" class="text-white/30 group-hover:text-white transition-colors"></lucide-icon>
          <span class="text-sm font-medium">LinkedIn</span>
        </a>
        <a
          href="https://behance.net/Marbles"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 text-white/60 hover:text-white transition-colors duration-200 no-underline group"
        >
          <lucide-icon name="palette" [size]="16" class="text-white/30 group-hover:text-white transition-colors"></lucide-icon>
          <span class="text-sm font-medium">Behance</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="border-t border-white/5">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 py-5 flex flex-col sm:flex-row items-center justify-between gap-3">
      <p class="text-white/25 text-xs">
        &copy; {{ year }} Sara Holanda. Todos os direitos reservados.
      </p>
      <p class="text-white/25 text-xs">
        Feito com amor por mim ♥
      </p>
    </div>
  </div>
</footer>
