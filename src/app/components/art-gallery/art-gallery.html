<section id="gallery" class="bg-jungle py-28">
  <div class="max-w-7xl mx-auto px-6 lg:px-10">

    <!-- Header -->
    <div class="section-header mb-16">
      <p class="reveal-child text-white/50 text-sm font-medium tracking-[0.3em] uppercase mb-3 opacity-0">
        Ilustrações &amp; Arte Digital
      </p>
      <h2 class="reveal-child font-display font-black text-white leading-none opacity-0"
          style="font-size: clamp(2.5rem, 6vw, 5rem);">
        Art Gallery
      </h2>
      <div class="reveal-child w-20 h-1 bg-white/40 mt-4 opacity-0"></div>
    </div>

    <!-- Masonry grid -->
    <div class="gallery-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 auto-rows-[220px]">
      @for (piece of pieces(); track piece.src) {
        <div
          class="gallery-item group relative overflow-hidden cursor-pointer opacity-0"
          [class]="getGridClass(piece.span)"
          (click)="openLightbox(piece)"
          [attr.aria-label]="'Abrir ' + piece.title"
          role="button"
          tabindex="0"
          (keydown.enter)="openLightbox(piece)"
        >
          @if (piece.isVideo) {
            <video
              [src]="piece.src"
              autoplay muted loop playsinline
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            ></video>
          } @else {
            <img
              [src]="piece.src"
              [alt]="piece.title"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
              loading="lazy"
            />
          }
          <!-- Overlay -->
          <div class="absolute inset-0 bg-dark/0 group-hover:bg-dark/50 transition-all duration-300 flex items-end p-4">
            <span class="text-white font-display font-bold text-sm translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
              {{ piece.title }}
            </span>
          </div>
          <div class="absolute top-3 right-3 w-8 h-8 bg-white/0 group-hover:bg-white/20 rounded-full flex items-center justify-center transition-all duration-300 opacity-0 group-hover:opacity-100">
            <lucide-icon name="external-link" [size]="14" class="text-white"></lucide-icon>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- Lightbox -->
@if (lightboxItem()) {
  <div
    class="lightbox-overlay fixed inset-0 z-50 bg-dark/95 backdrop-blur-sm flex items-center justify-center p-4 md:p-10 opacity-0"
    (click)="closeLightbox()"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="lightboxItem()!.title"
  >
    <button
      class="absolute top-5 right-5 text-white/70 hover:text-white border-0 bg-transparent cursor-pointer z-10 transition-colors"
      (click)="closeLightbox()"
      aria-label="Fechar"
    >
      <lucide-icon name="x" [size]="28"></lucide-icon>
    </button>

    <div class="lightbox-media relative max-w-4xl max-h-full opacity-0" (click)="$event.stopPropagation()">
      @if (lightboxItem()!.isVideo) {
        <video [src]="lightboxItem()!.src" controls autoplay class="max-w-full max-h-[80vh] object-contain"></video>
      } @else {
        <img [src]="lightboxItem()!.src" [alt]="lightboxItem()!.title" class="max-w-full max-h-[80vh] object-contain" />
      }
      <p class="text-white/60 text-sm font-display font-medium mt-4 text-center">
        {{ lightboxItem()!.title }}
      </p>
    </div>
  </div>
}
