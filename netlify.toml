[build]
  command   = "ng build --configuration production"
  publish   = "dist/portfolio/browser"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command    = "ng serve"
  port       = 4200
  targetPort = 4200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
